<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, height=device-height, user-scalable=0, minimum-scale=1.0, maximum-scale=1.0, initial-scale=1">
  <title>Just a sun. What did you expect?</title>
  <style>
    body {
      overflow: hidden;
    }

    #sun {
      --size: 60vmin;
      width: var(--size);
      height: var(--size);
      position: absolute;
      top: 50%;
      left: 50%;
      animation-name: spin;
      animation-duration: 4000ms;
      animation-iteration-count: infinite;
      animation-timing-function: linear;
    }
    
    @keyframes spin {
      from {
        transform: translate(-50%,-50%) rotateY(0deg);
        moz-transform: translate(-50%,-50%) rotateY(0deg); //Firefox
        ms-transform: translate(-50%,-50%) rotateY(0deg); //Microsoft Browsers
      }
      to {
        transform: rotateY(360deg) translate(-50%,-50%);
        moz-transform: rotateY(360deg) translate(-50%,-50%); //Firefox
        ms-transform: rotateY(360deg) translate(-50%,-50%); //Microsoft Browsers
      }
    }
    
    @-webkit-keyframes spin {
      from{-webkit-transform: translate(-50%,-50%) rotateY(0deg);}
      to{-webkit-transform: rotateY(360deg) translate(-50%,-50%);}
    }
  </style>
</head>
<body>
  <image src="./assets/images/sun.png" id="sun" />
</body>
</html>
