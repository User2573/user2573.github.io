<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, height=device-height, user-scalable=0, minimum-scale=1.0, maximum-scale=1.0, initial-scale=1">
  <title>Just a sun. What did you expect?</title>
  <style>
    body {
      overflow: hidden;
    }

    #sun {
      --size: 60vmin;
      width: var(--size);
      height: var(--size);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%);
      animation: 5s linear 0 infinite spin;
    }
    
    @keyframes spin {
      from {
        transform: rotateY(0deg);
        moz-transform: rotateY(0deg); //Firefox
        ms-transform: rotateY(0deg); //Microsoft Browsers
      }
      to {
        transform: rotateY(360deg);
        moz-transform: rotateY(360deg); //Firefox
        ms-transform: rotateY(360deg); //Microsoft Browsers
      }
    }
    
    @-webkit-keyframes spin {
      from{-webkit-transform: rotateY(0deg);}
      to{-webkit-transform: rotateY(360deg);}
    }
  </style>
</head>
<body>
  <image src="./assets/images/sun.png" id="sun" />
</body>
</html>
