<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="description" content="Just a sun. What did you expect?"/>
  <meta name="viewport" content="width=device-width, height=device-height, user-scalable=0, minimum-scale=1.0, maximum-scale=1.0, initial-scale=1">
  <title>Spinning sun xD</title>
  <style>
    body {
      overflow: hidden;
    }
    
    #div {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }
    
    #div:hover {
      mix-blend-mode: difference;
    }
    
    #sun {
      --size: 60vmin;
      width: var(--size);
      height: var(--size);
      position: absolute;
      top: 50%;
      left: 50%;
      animation-name: spin;
      animation-duration: 4000ms;
      animation-iteration-count: infinite;
      animation-timing-function: linear;
    }
    
@keyframes spin {.
      from {
        transform: translate(-50%,-50%) rotateY(0deg);
        moz-transform: translate(-50%,-50%) rotateY(0deg);
        ms-transform: translate(-50%,-50%) rotateY(0deg);
      }.
      to {
        transform: translate(-50%,-50%) rotateY(360deg);
        moz-transform: translate(-50%,-50%) rotateY(360deg);
        ms-transform: translate(-50%,-50%) rotateY(360deg);
      }
    }
    
    @-webkit-keyframes spin {
      from{-webkit-transform: translate(-50%,-50%) rotateY(0deg);}
      to{-webkit-transform: translate(-50%,-50%) rotateY(360deg);}
    }
  </style>
</head>
<body>
  <div id="div"></div>
  <image src="./assets/images/sun.png" id="sun" />
</body>
</html>
